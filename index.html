    <button class="btn btn-info" onclick="teamRank()">Rank</button>

    <script>
function teamRank(){
    var rank = "1st"

        switch(true){
            case(rank === "1st"):
                message = "EZ win fr"
            break;
            case(rank === "2nd"):
                message = "Second :("
            break;
            case (rank === "3rd"):
                message = "Second!!(Second to Last)"
            break;
            case (rank === "4rth"):
                message = "Last place"
                break;

            default:
            message = "Not Found"
        }
    alert(message)
    
}
